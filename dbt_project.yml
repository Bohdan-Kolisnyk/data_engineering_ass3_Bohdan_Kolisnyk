name: 'kse_delivery'
version: '1.0.0'
config-version: 2

profile: 'kse_delivery'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  kse_delivery:
    +schema: raw
    customers:
      +column_types:
        phone: varchar
    couriers:
      +column_types:
        phone: varchar

models:
  kse_delivery:
    raw:
      +materialized: view
      +schema: raw
    staging:
      +materialized: view
      +schema: staging
    mart:
      dims:
        +materialized: table
        +schema: mart
      facts:
        +materialized: incremental
        +schema: mart
      analytics:
        +materialized: table
        +schema: mart