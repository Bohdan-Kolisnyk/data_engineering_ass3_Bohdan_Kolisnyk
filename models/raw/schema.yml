version: 2

models:
  - name: raw_customers
    description: "Raw customer data from seed"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: raw_orders
    description: "Raw order data from seed"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null